# For more information: https://laravel.com/docs/sail
version: '3'
services:
  app:
    image: dinhquochan/laravel:php8.2
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - 8080:80
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: farmart
      MYSQL_USER: farmart_user
      MYSQL_PASSWORD: farmart_password
    volumes:
      - 'sail-mysql:/var/lib/mysql'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s
networks:
  sail:
    driver: bridge
volumes:
  sail-mysql:
    driver: local
